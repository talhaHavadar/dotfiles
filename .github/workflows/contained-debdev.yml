name: contained-debdev
on:
  push:
    branches: [main]
    paths:
      - 'dot/bin/contained/container.files/Containerfile.*'
      - 'dot/bin/contained/container.scripts/**'
      - '.github/workflows/contained-debdev.yml'
  schedule:
    # Weekly rebuild keeps the baked-in chroot tarball fresh against security
    # updates. Sunday 04:00 UTC.
    - cron: '0 4 * * 0'
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  # Needed so docker/build-push-action can attach SLSA provenance and SBOM
  # attestations to the manifest list when push: true.
  id-token: write
  attestations: write
concurrency:
  group: contained-debdev-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {distro: debian, release: unstable}
          - {distro: ubuntu, release: resolute}
          - {distro: ubuntu, release: devel}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/talhahavadar/contained-debdev
          tags: |
            type=raw,value=${{ matrix.distro }}-${{ matrix.release }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: dot/bin/contained
          file: dot/bin/contained/container.files/Containerfile.${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            RELEASE=${{ matrix.release }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.release }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.release }}
